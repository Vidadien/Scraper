name: Ejecutar scraper de fondos

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas beautifulsoup4 playwright

      - name: Instalar Chromium
        run: playwright install chromium

      - name: Ejecutar scraper
        run: xvfb-run python scrapper.py
      - name: Configurar Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Commit y push del CSV
        run: |
          git add fondos.csv
          git diff --cached --quiet || git commit -m "Actualizar fondos $(date +'%Y-%m-%d')"
          git push
